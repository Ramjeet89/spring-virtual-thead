spring.application.name=spring-virtual-thead
spring.datasource.url=jdbc:mysql://localhost:3306/microservice?useSSL=false&serverTimezone=UTC&useLegacyDatetimeCode=false
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.show-sql = true
spring.jpa.hibernate.ddl-auto=update
#spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQLDialect
server.port=9191
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
logging.level.root=INFO
#logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger - %msg%n
logging.pattern.console=%clr(%d{HH:mm:ss.SSS}){green} %clr([%thread]){yellow} %clr(%-5level){red} %clr(%logger){blue} - %msg%n